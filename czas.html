<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Odliczanie do 30 kwietnia 20:00</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111, #1e1e2f);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      padding: 40px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 20px;
    }

    #timer {
      font-size: 3em;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Odliczanie do 30 kwietnia 20:00</h1>
    <div id="timer">Ładowanie...</div>
  </div>

  <script>
    const now = new Date();
    let year = now.getFullYear();

    let endTime = new Date(year, 3, 30, 20, 0, 0);

    if (now > endTime) {
      endTime = new Date(year + 1, 3, 30, 20, 0, 0);
    }

    function updateTimer() {
      const now = new Date();
      const distance = endTime - now;

      if (distance <= 0) {
        document.getElementById("timer").innerHTML = "Czas minął!";
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);

      document.getElementById("timer").innerHTML =
        days + "d " + hours + "h " + minutes + "m " + seconds + "s";
    }

    setInterval(updateTimer, 1000);
    updateTimer();
  </script>
</body>
</html>
